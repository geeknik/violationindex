<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111;
  --border:#1a1a1a;
  --text:#c8c8c8;
  --dim:#666;
  --accent:#d42020;
  --blue:#3b82f6;
  --white:#e8e8e8;
  --mono:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
}
body{
  width:340px;
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  line-height:1.5;
  padding:12px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.title{font-weight:700;color:var(--white);font-size:13px}
.status{font-size:10px;color:var(--dim)}

.domain{
  font-size:11px;
  color:var(--white);
  margin-bottom:8px;
}
.domain span{color:var(--dim);font-size:10px}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-bottom:12px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  padding:8px;
}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.stat-value{font-size:18px;font-weight:700;color:var(--white)}
.stat-value.alert{color:var(--accent)}

.violations{
  max-height:200px;
  overflow-y:auto;
  margin-bottom:12px;
}
.violation{
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  font-size:11px;
}
.violation:last-child{border-bottom:none}
.violation-dest{color:var(--accent);font-weight:600}
.violation-name{color:var(--dim);font-size:10px}
.violation-time{color:var(--dim);font-size:9px;float:right}

.empty{
  text-align:center;
  padding:20px;
  color:var(--dim);
  font-size:11px;
}

.actions{display:flex;gap:6px}
.btn{
  flex:1;
  padding:8px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:var(--mono);
  font-size:11px;
  cursor:pointer;
  text-align:center;
}
.btn:hover{border-color:var(--dim)}
.btn-primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:600;
}
.btn-primary:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:default}

.section-header{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--white);
  margin-bottom:4px;
  padding-top:6px;
  border-top:1px solid var(--border);
}
.policy-section{margin-bottom:8px}
.policy-list{margin:4px 0;font-size:10px}
.policy-item{
  padding:3px 6px;
  margin:2px 0;
}
.policy-item.disclosed{color:#4ade80}
.policy-item.undisclosed{color:var(--accent);font-weight:600}
.policy-item .tag{
  display:inline-block;
  padding:0 4px;
  font-size:8px;
  text-transform:uppercase;
  letter-spacing:.05em;
  border-radius:2px;
  margin-right:4px;
}
.policy-item.disclosed .tag{background:#14532d;color:#4ade80}
.policy-item.undisclosed .tag{background:#450a0a;color:var(--accent)}

.footer{
  margin-top:10px;
  padding-top:8px;
  border-top:1px solid var(--border);
  font-size:9px;
  color:var(--dim);
  text-align:center;
}
.footer a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <span class="title">consent.watch</span>
  <span class="status" id="status">scanning...</span>
</div>

<div class="domain" id="domain">—<span> loading</span></div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Pre-Consent</div>
    <div class="stat-value alert" id="pre-consent-count">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Trackers</div>
    <div class="stat-value" id="total-count">0</div>
  </div>
</div>

<div class="violations" id="violations">
  <div class="empty">No violations detected on this page.</div>
</div>

<div class="policy-section" id="policy-section" style="display:none">
  <div class="section-header">Privacy Policy Analysis</div>
  <div id="policy-link" style="font-size:9px;color:var(--dim);margin-bottom:4px"></div>
  <div id="policy-disclosed" class="policy-list"></div>
  <div id="policy-undisclosed" class="policy-list"></div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="submit-btn" disabled>Submit Evidence</button>
  <button class="btn" id="details-btn">Full Record</button>
</div>

<div class="footer">
  Part of <a href="https://violationindex.com" target="_blank">Violation Index</a>
</div>

<script src="popup.js"></script>
</body>
</html>
